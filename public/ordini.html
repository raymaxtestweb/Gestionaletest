<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Ordini — Massimo Inturrisi</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ef;--bg2:#ede9e2;--bg3:#e2dcd3;--ink:#1c1917;--ink2:#44403c;--ink3:#78716c;--gold:#a0845c;--gold2:#c9a87a;--gold3:#e8d5b7;--gold4:#f5ede0;--gold5:#faf7f2;--white:#fff;--red:#b91c1c;--green:#166534;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);}
header{background:var(--ink);height:58px;padding:0 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.brand{font-family:'Libre Baskerville',serif;font-size:1.05rem;color:#fff;font-weight:400;}.brand small{display:block;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold2);margin-top:1px;}
.header-links{display:flex;gap:10px;}
.header-link{color:rgba(255,255,255,.5);font-size:.72rem;text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .2s;}
.header-link:hover{color:#fff;background:rgba(255,255,255,.08);}
.wrap{max-width:1100px;margin:0 auto;padding:28px 40px 60px;}

/* ── STAT CARDS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat{background:var(--white);border-radius:var(--r);padding:18px 20px;border:1px solid var(--bg3);box-shadow:0 2px 10px rgba(28,25,23,.06);}
.stat-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.stat-val{font-family:'Libre Baskerville',serif;font-size:1.5rem;font-weight:400;color:var(--ink);}
.stat-val.green{color:var(--green);}
.stat-val.gold{color:var(--gold);}

/* ── FILTRI ── */
.filters{background:var(--white);border-radius:var(--r);padding:16px 20px;border:1px solid var(--bg3);box-shadow:0 2px 10px rgba(28,25,23,.06);margin-bottom:20px;display:flex;gap:12px;align-items:end;flex-wrap:wrap;}
.ff{flex:1;min-width:140px;}
.ff label{display:block;font-size:.6rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.ff input,.ff select{width:100%;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--ink);outline:none;transition:border-color .2s;}
.ff input:focus,.ff select:focus{border-color:var(--gold);}
.btn{padding:10px 18px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--ink);color:#fff;}.btn-primary:hover{background:#333;}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:#8a7050;}

/* ── TABELLA ── */
.table-card{background:var(--white);border-radius:var(--r);border:1px solid var(--bg3);box-shadow:0 2px 10px rgba(28,25,23,.06);overflow:hidden;}
.orders-table{width:100%;border-collapse:collapse;}
.orders-table thead th{background:var(--ink);color:#fff;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;padding:11px 14px;text-align:left;font-weight:600;}
.orders-table thead th.r{text-align:right;}
.orders-table tbody tr{border-bottom:1px solid var(--bg2);cursor:pointer;transition:background .12s;}
.orders-table tbody tr:hover{background:var(--gold5);}
.orders-table td{padding:11px 14px;font-size:.84rem;vertical-align:middle;}
.orders-table td.r{text-align:right;}
.orders-table td.b{font-weight:700;}
.empty-row td{text-align:center;padding:40px;color:var(--ink3);font-size:.85rem;}

/* ── STATO BADGE ── */
.stato{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .2s;border:none;font-family:'DM Sans',sans-serif;}
.stato.in_lavorazione{background:#fef3c7;color:#92400e;}
.stato.pronto{background:#dbeafe;color:#1e40af;}
.stato.consegnato{background:#d1fae5;color:#065f46;}
.stato:hover{opacity:.8;}

/* ── PANEL DETTAGLIO ── */
.panel-overlay{position:fixed;inset:0;background:rgba(28,25,23,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.panel-overlay.on{display:flex;}
.panel{background:var(--white);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);}
.panel-head{background:var(--ink);padding:20px 24px;border-radius:16px 16px 0 0;position:relative;}
.panel-title{font-family:'Libre Baskerville',serif;font-size:1.1rem;color:#fff;font-weight:400;}
.panel-sub{font-size:.72rem;color:rgba(255,255,255,.55);margin-top:3px;}
.panel-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.panel-close:hover{background:rgba(255,255,255,.2);}
.panel-body{padding:20px 24px;}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg2);font-size:.86rem;}
.detail-row:last-child{border-bottom:none;}
.detail-lbl{color:var(--ink3);font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding-top:2px;}
.detail-val{font-weight:600;color:var(--ink);text-align:right;}
.items-mini{background:var(--bg);border-radius:8px;padding:10px 12px;margin-top:8px;}
.item-line{display:flex;justify-content:space-between;font-size:.78rem;padding:3px 0;border-bottom:1px dashed var(--bg3);}
.item-line:last-child{border-bottom:none;}
.panel-actions{padding:16px 24px;border-top:1px solid var(--bg2);display:flex;gap:10px;flex-wrap:wrap;}
.btn-sm{padding:8px 14px;font-size:.75rem;}
.btn-red{background:#fef2f2;border:1px solid #fecaca;color:var(--red);}.btn-red:hover{background:#fee2e2;}
.btn-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}.btn-blue:hover{background:#dbeafe;}
.btn-green{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--green);}.btn-green:hover{background:#dcfce7;}

/* ── STATO SELECT nel PANEL ── */
.stato-select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--bg3);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:600;color:var(--ink);outline:none;cursor:pointer;}
.stato-select:focus{border-color:var(--gold);}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:.8rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.18);transition:all .25s ease;z-index:1200;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

.loading{text-align:center;padding:40px;color:var(--ink3);}
</style>
</head>
<body>

<header>
  <div class="brand">Massimo Inturrisi<small>Fotografo</small></div>
  <div class="header-links">
    <a class="header-link" href="./ordine-stampa.html">+ Nuovo Ordine</a>
    <a class="header-link" href="./index.html">Home</a>
  </div>
</header>

<div class="wrap">

  <!-- STAT CARDS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Ordini totali</div>
      <div class="stat-val" id="statTot">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">In lavorazione</div>
      <div class="stat-val gold" id="statLav">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Incasso (filtro)</div>
      <div class="stat-val" id="statIncasso">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Netto (filtro)</div>
      <div class="stat-val green" id="statNetto">—</div>
    </div>
  </div>

  <!-- FILTRI -->
  <div class="filters">
    <div class="ff"><label>Mese</label>
      <select id="filtMese">
        <option value="">Tutti</option>
        <option value="01">Gennaio</option><option value="02">Febbraio</option>
        <option value="03">Marzo</option><option value="04">Aprile</option>
        <option value="05">Maggio</option><option value="06">Giugno</option>
        <option value="07">Luglio</option><option value="08">Agosto</option>
        <option value="09">Settembre</option><option value="10">Ottobre</option>
        <option value="11">Novembre</option><option value="12">Dicembre</option>
      </select>
    </div>
    <div class="ff"><label>Anno</label>
      <select id="filtAnno"><option value="">Tutti</option></select>
    </div>
    <div class="ff"><label>Stato</label>
      <select id="filtStato">
        <option value="">Tutti</option>
        <option value="in_lavorazione">In lavorazione</option>
        <option value="pronto">Pronto</option>
        <option value="consegnato">Consegnato</option>
      </select>
    </div>
    <div class="ff"><label>Cliente</label>
      <input type="text" id="filtCliente" placeholder="Nome...">
    </div>
    <button class="btn btn-primary" onclick="applyFilters()">Filtra</button>
    <button class="btn" style="background:var(--bg2);color:var(--ink2)" onclick="resetFilters()">Reset</button>
  </div>

  <!-- TABELLA -->
  <div class="table-card">
    <div class="loading" id="loadingMsg">Caricamento ordini...</div>
    <table class="orders-table" id="ordersTable" style="display:none">
      <thead>
        <tr>
          <th>Data</th>
          <th>Cliente</th>
          <th>Note</th>
          <th>Stato</th>
          <th class="r">Incasso</th>
          <th class="r">Netto</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>

</div>

<!-- PANEL DETTAGLIO -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanelIfBg(event)">
  <div class="panel" id="panel">
    <div class="panel-head">
      <div class="panel-title" id="panelTitle">—</div>
      <div class="panel-sub" id="panelSub">—</div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-actions" id="panelActions"></div>
  </div>
</div>

<div class="toast" id="toastMsg"></div>

<script>
// ══════════════════════════════════════════════════════
// DATI
// ══════════════════════════════════════════════════════
let ALL_ORDERS = [];
let _openOrderId = null;

const STATO_LABELS = {
  in_lavorazione: 'In lavorazione',
  pronto: 'Pronto',
  consegnato: 'Consegnato'
};

// ══════════════════════════════════════════════════════
// FETCH ORDINI
// ══════════════════════════════════════════════════════
async function fetchOrders(){
  try{
    const res = await fetch('/.netlify/functions/orders-get');
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    ALL_ORDERS = data.orders || [];
  }catch(e){
    console.warn('Ordini non disponibili:', e.message);
    ALL_ORDERS = [];
  }
}

// ══════════════════════════════════════════════════════
// FILTRI
// ══════════════════════════════════════════════════════
function getFiltered(){
  const mese = document.getElementById('filtMese').value;
  const anno = document.getElementById('filtAnno').value;
  const stato = document.getElementById('filtStato').value;
  const cliente = document.getElementById('filtCliente').value.trim().toLowerCase();

  return ALL_ORDERS.filter(o => {
    const d = o.createdAt ? o.createdAt.slice(0,7) : ''; // YYYY-MM
    const [y, m] = d.split('-');
    if(mese && m !== mese) return false;
    if(anno && y !== anno) return false;
    if(stato && o.stato !== stato) return false;
    if(cliente && !(o.clientName||'').toLowerCase().includes(cliente)) return false;
    return true;
  });
}

function applyFilters(){ renderTable(getFiltered()); }
function resetFilters(){
  document.getElementById('filtMese').value='';
  document.getElementById('filtAnno').value='';
  document.getElementById('filtStato').value='';
  document.getElementById('filtCliente').value='';
  renderTable(ALL_ORDERS);
}

// ══════════════════════════════════════════════════════
// RENDER TABELLA
// ══════════════════════════════════════════════════════
function fp(n){ return Number(n||0).toFixed(2).replace('.',','); }
function prettyDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function renderTable(orders){
  document.getElementById('loadingMsg').style.display='none';
  const table = document.getElementById('ordersTable');
  table.style.display = 'table';
  const tbody = document.getElementById('ordersBody');

  // Stats
  const totalLav = ALL_ORDERS.filter(o=>o.stato==='in_lavorazione').length;
  const incasso = orders.reduce((s,o)=>s+(o.incasso||0),0);
  const netto = orders.reduce((s,o)=>s+(o.netto||0),0);
  document.getElementById('statTot').textContent = ALL_ORDERS.length;
  document.getElementById('statLav').textContent = totalLav;
  document.getElementById('statIncasso').textContent = '€ '+fp(incasso);
  document.getElementById('statNetto').textContent = '€ '+fp(netto);

  if(!orders.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Nessun ordine trovato.</td></tr>';
    return;
  }

  // Ordina per data decrescente
  const sorted = [...orders].sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));

  tbody.innerHTML = sorted.map(o => {
    const statoLabel = STATO_LABELS[o.stato] || o.stato || '—';
    return `<tr onclick="openPanel('${o.orderId}')">
      <td style="white-space:nowrap;font-size:.78rem;color:var(--ink3)">${prettyDate(o.createdAt)}</td>
      <td class="b">${esc(o.clientName||'—')}</td>
      <td style="color:var(--ink3);font-size:.78rem">${esc(o.orderNote||'—')}</td>
      <td><button class="stato ${o.stato||'in_lavorazione'}" onclick="event.stopPropagation();cycleStato('${o.orderId}')">${statoLabel}</button></td>
      <td class="r b">€ ${fp(o.incasso)}</td>
      <td class="r" style="color:var(--green);font-weight:700">€ ${fp(o.netto)}</td>
    </tr>`;
  }).join('');
}

function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// ══════════════════════════════════════════════════════
// CICLO STATO (click diretto sulla riga)
// ══════════════════════════════════════════════════════
const STATI = ['in_lavorazione','pronto','consegnato'];
async function cycleStato(orderId){
  const o = ALL_ORDERS.find(x=>x.orderId===orderId);
  if(!o) return;
  const cur = STATI.indexOf(o.stato||'in_lavorazione');
  const next = STATI[(cur+1)%STATI.length];
  await updateStato(orderId, next);
}

async function updateStato(orderId, newStato){
  const o = ALL_ORDERS.find(x=>x.orderId===orderId);
  if(!o) return;
  o.stato = newStato;
  try{
    const res = await fetch('/.netlify/functions/orders-upsert',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(o)
    });
    const data = await res.json();
    if(!res.ok||!data.ok) throw new Error(data.error||'errore');
    showToast('Stato aggiornato: '+STATO_LABELS[newStato]);
    renderTable(getFiltered());
    if(_openOrderId===orderId) openPanel(orderId); // aggiorna panel se aperto
  }catch(e){
    showToast('Errore: '+e.message);
  }
}

// ══════════════════════════════════════════════════════
// PANEL DETTAGLIO
// ══════════════════════════════════════════════════════
function openPanel(orderId){
  _openOrderId = orderId;
  const o = ALL_ORDERS.find(x=>x.orderId===orderId);
  if(!o) return;

  document.getElementById('panelTitle').textContent = o.clientName||'—';
  document.getElementById('panelSub').textContent = prettyDate(o.createdAt) + ' · ' + (o.orderId||'');

  const row = (lbl,val) => `<div class="detail-row"><span class="detail-lbl">${lbl}</span><span class="detail-val">${val}</span></div>`;

  let itemsHtml = '';
  if(o.items&&o.items.length){
    itemsHtml = '<div class="items-mini">'+(o.items.map(it=>`<div class="item-line"><span>${esc(it.code)} · ${esc(it.desc)} ×${it.qty}</span><span style="font-weight:600">€ ${fp(it.total)}</span></div>`).join(''))+'</div>';
  }

  const payInfo = o.payType==='anticipato'
    ? 'Anticipato completo'
    : `Acconto € ${fp(o.acconto)} · Saldo € ${fp(o.saldo)}`;

  document.getElementById('panelBody').innerHTML =
    row('Telefono', esc(o.clientPhone||'—'))+
    row('Note', esc(o.orderNote||'—'))+
    row('Pagamento', payInfo)+
    row('Incasso', '<strong>€ '+fp(o.incasso)+'</strong>')+
    row('Costo produzione', '€ '+fp(o.costo))+
    row('Guadagno netto', '<strong style="color:var(--green)">€ '+fp(o.netto)+'</strong>')+
    (itemsHtml ? '<div style="margin-top:12px;font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px">Articoli</div>'+itemsHtml : '');

  // Azioni: cambio stato + elimina
  document.getElementById('panelActions').innerHTML = `
    <div style="flex:1">
      <div style="font-size:.6rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px">Stato ordine</div>
      <select class="stato-select" onchange="updateStato('${o.orderId}',this.value)">
        <option value="in_lavorazione" ${o.stato==='in_lavorazione'?'selected':''}>In lavorazione</option>
        <option value="pronto" ${o.stato==='pronto'?'selected':''}>Pronto</option>
        <option value="consegnato" ${o.stato==='consegnato'?'selected':''}>Consegnato</option>
      </select>
    </div>
    <button class="btn btn-sm btn-red" onclick="deleteOrder('${o.orderId}')">Elimina</button>`;

  document.getElementById('panelOverlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function closePanel(){
  _openOrderId = null;
  document.getElementById('panelOverlay').classList.remove('on');
  document.body.style.overflow='';
}
function closePanelIfBg(e){ if(e.target===document.getElementById('panelOverlay')) closePanel(); }

async function deleteOrder(orderId){
  if(!confirm('Eliminare questo ordine?')) return;
  try{
    const res = await fetch('/.netlify/functions/orders-delete',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({orderId})
    });
    const data = await res.json();
    if(!res.ok||!data.ok) throw new Error(data.error||'errore');
    ALL_ORDERS = ALL_ORDERS.filter(x=>x.orderId!==orderId);
    closePanel();
    renderTable(getFiltered());
    showToast('Ordine eliminato');
  }catch(e){ showToast('Errore: '+e.message); }
}

// ══════════════════════════════════════════════════════
// ANNI PER FILTRO
// ══════════════════════════════════════════════════════
function populateYears(){
  const years = new Set(ALL_ORDERS.map(o=>(o.createdAt||'').slice(0,4)).filter(Boolean));
  const sel = document.getElementById('filtAnno');
  const cur = new Date().getFullYear().toString();
  if(!years.has(cur)) years.add(cur);
  [...years].sort((a,b)=>b-a).forEach(y=>{
    const opt = document.createElement('option');
    opt.value=y; opt.textContent=y;
    if(y===cur) opt.selected=true;
    sel.appendChild(opt);
  });
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
function showToast(msg){ const el=document.getElementById('toastMsg');el.textContent=msg;el.classList.add('on');clearTimeout(showToast._t);showToast._t=setTimeout(()=>el.classList.remove('on'),2400); }

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
(async function init(){
  await fetchOrders();
  populateYears();
  // Preseleziona mese corrente
  const m = String(new Date().getMonth()+1).padStart(2,'0');
  document.getElementById('filtMese').value = m;
  renderTable(getFiltered());
})();
</script>
</body>
</html>
