<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Massimo Inturrisi — Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;--bg2:#ede9e2;--bg3:#e2dcd3;--gold3:#e8d5b7;
  --ink:#1c1917;--ink2:#44403c;--ink3:#78716c;
  --gold:#a0845c;--gold2:#c9a87a;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);}

header{
  background:var(--ink);padding:0 24px;display:flex;align-items:center;
  padding-top:max(0px,env(safe-area-inset-top));
  height:calc(58px + env(safe-area-inset-top,0px));
}
.brand{font-family:'Playfair Display',serif;font-size:1.05rem;color:#fff;font-weight:600;line-height:1.2;}
.brand small{display:block;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold2);font-family:'DM Sans',sans-serif;font-weight:400;}

.wrap{max-width:560px;margin:0 auto;padding:32px 20px 60px;}

.welcome{margin-bottom:28px;}
.welcome-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:600;color:var(--ink);margin-bottom:6px;}
.welcome-sub{font-size:.85rem;color:var(--ink3);line-height:1.5;}

.divider{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--bg3),transparent);}
.divider span{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);white-space:nowrap;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.tile{
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:150px;background:var(--white);
  border:1px solid var(--bg3);border-radius:20px;
  box-shadow:0 2px 16px rgba(28,25,23,.06),0 0 0 1px rgba(0,0,0,.03);
  text-decoration:none;color:var(--ink);padding:24px 16px;text-align:center;
  transition:all .35s cubic-bezier(.22,1,.36,1);overflow:hidden;
}
.tile:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(28,25,23,.1),0 4px 12px rgba(160,132,92,.08);border-color:var(--gold3);}
.tile:active{transform:scale(.97);}

.tile-arrow{
  position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translate(-4px,4px);transition:all .35s cubic-bezier(.22,1,.36,1);
}
.tile:hover .tile-arrow{opacity:1;transform:none;}
.tile-arrow svg{width:13px;height:13px;fill:none;stroke:var(--gold);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.tile-icon-wrap{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;transition:all .35s cubic-bezier(.22,1,.36,1);
}
.tile:hover .tile-icon-wrap{transform:scale(1.08);}
.tile-icon-wrap svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

.icon-prev{background:linear-gradient(135deg,#1c1917,#3a3530);}
.icon-cal{background:linear-gradient(135deg,#1e40af,#3b82f6);}
.icon-contr{background:linear-gradient(135deg,#166534,#22863a);}
.icon-ord{background:linear-gradient(135deg,#7c3aed,#a855f7);}

.tile-label{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:3px;}
.tile-sub{font-size:.7rem;color:var(--ink3);letter-spacing:.04em;}

.footer{text-align:center;margin-top:40px;}
.footer-line{font-size:.68rem;color:var(--ink3);letter-spacing:.06em;}
.footer-brand{display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);}
.footer-brand::before,.footer-brand::after{content:'';width:20px;height:1px;background:var(--gold3);}

@media(max-width:680px){
  .wrap{padding:28px 16px 48px;}
  .grid{grid-template-columns:1fr;}
  .tile{min-height:80px;flex-direction:row;gap:14px;padding:18px 16px;text-align:left;justify-content:flex-start;border-radius:14px;}
  .tile-icon-wrap{margin-bottom:0;flex-shrink:0;}
  .tile-arrow{top:50%;right:14px;transform:translateY(-50%) translateX(-4px);opacity:.35;}
  .tile:hover .tile-arrow{transform:translateY(-50%);}
}
</style>
</head>
<body>

<header>
  <div class="brand">Massimo Inturrisi<small>Fotografo</small></div>
</header>

<div class="wrap">
  <div class="welcome">
    <div class="welcome-title">Strumenti studio</div>
    <div class="welcome-sub">Seleziona lo strumento. Il sito si adatta automaticamente a desktop e mobile.</div>
  </div>

  <div class="divider"><span>Strumenti</span></div>

  <div class="grid">
    <a class="tile" href="./preventivo.html">
      <div class="tile-arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg></div>
      <div class="tile-icon-wrap icon-prev">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
      </div>
      <div>
        <div class="tile-label">Preventivo</div>
        <div class="tile-sub">Crea e invia</div>
      </div>
    </a>
    <a class="tile" href="./calendario.html">
      <div class="tile-arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg></div>
      <div class="tile-icon-wrap icon-cal">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
      </div>
      <div>
        <div class="tile-label">Calendario</div>
        <div class="tile-sub">Gestione date</div>
      </div>
    </a>
    <a class="tile" href="./contratto.html">
      <div class="tile-arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg></div>
      <div class="tile-icon-wrap icon-contr">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
      </div>
      <div>
        <div class="tile-label">Contratto</div>
        <div class="tile-sub">Firma digitale</div>
      </div>
    </a>
    <a class="tile" href="./ordine-stampa.html">
      <div class="tile-arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg></div>
      <div class="tile-icon-wrap icon-ord">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      </div>
      <div>
        <div class="tile-label">Ordine Stampa</div>
        <div class="tile-sub">Gestione ordini</div>
      </div>
    </a>
  </div>

  <div class="footer">
    <div class="footer-line">Massimo Inturrisi · Fotografo</div>
    <div class="footer-brand">Studio</div>
  </div>
</div>

</body>
</html>
